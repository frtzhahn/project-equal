<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="about us.css">
    <title>About Us</title>
</head>

<body class="fade-in">

    <div class="header">
        <div class="header-left">
            <img src="10.png" alt="STEM LOGO" title="STEM LOGO" class="header-logo">
            <h1 class="header-title">ABOUT 
                <br>
                 US </h1>
            <hr class="vertical-hr">
        </div>
        <div class="header-right">
            <button class="header-button" id="return-homepage-button" title="click me!">Return to Homepage</button>
            <button class="header-button" id="mobile-view-button" title="Toggle Mobile View">Mobile View</button>
        </div>
    </div>

    <script>
        document.getElementById('mobile-view-button').addEventListener('click', function() {
            document.body.classList.toggle('mobile-view');
        });

        document.getElementById('return-homepage-button').addEventListener('click', function(event) {
            event.preventDefault();
            document.body.classList.add('fade-out');
            setTimeout(function() {
                window.location.href = 'homepage.html';
            }, 1000); // Match the duration of the fade-out animation
        });
    </script>
    
</body>
</html>
